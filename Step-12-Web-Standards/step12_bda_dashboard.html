<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDA Monitoring Center - UI Architecture</title>
    <style>
        /* ========================================================
           CSS3 Enterprise Architecture & Variables
           ======================================================== */
        :root {
            --bg-color: #0a192f;
            --surface-color: #112240;
            --text-primary: #ccd6f6;
            --text-secondary: #8892b0;
            --accent-green: #64ffda;
            --border-radius: 8px;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* CSS Reset for consistent rendering */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.6;
        }

        /* ========================================================
           CSS Grid Architecture: BDA Dashboard Layout
           ======================================================== */
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 80px 1fr;
            grid-template-areas: 
                "sidebar header"
                "sidebar main";
            height: 100vh;
        }

        /* Semantic Header */
        header {
            grid-area: header;
            background-color: var(--surface-color);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            border-bottom: 1px solid #233554;
        }

        /* Semantic Aside (Sidebar) */
        aside {
            grid-area: sidebar;
            background-color: var(--surface-color);
            padding: 2rem 1rem;
            border-right: 1px solid #233554;
        }

        /* Semantic Main Content */
        main {
            grid-area: main;
            padding: 2rem;
            overflow-y: auto;
        }

        /* ========================================================
           Telemetry Data Cards (CSS Flexbox inside Grid)
           ======================================================== */
        .telemetry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .data-card {
            background-color: var(--surface-color);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border-left: 4px solid var(--accent-green);
            transition: transform 0.2s ease-in-out;
        }

        .data-card:hover {
            transform: translateY(-5px);
        }

        .data-card h3 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .data-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-green);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <aside>
            <h2 style="color: var(--accent-green);">BDA System</h2>
            <p style="color: var(--text-secondary); margin-top: 10px; font-size: 0.9rem;">Edge Layer Monitoring</p>
        </aside>

        <header>
            <h1>Municipality Smart Market Telemetry</h1>
        </header>

        <main>
            <section>
                <h2>Live Node Diagnostics</h2>
                <p style="color: var(--text-secondary);">Real-time metrics rendered via CSS3 Grid Architecture</p>
                
                <div class="telemetry-grid">
                    <article class="data-card">
                        <h3>Active POS Terminals</h3>
                        <div class="value">1,402</div>
                    </article>
                    
                    <article class="data-card">
                        <h3>Weighbridges (Zero-GC)</h3>
                        <div class="value">84</div>
                    </article>

                    <article class="data-card">
                        <h3>Network Latency</h3>
                        <div class="value">14 ms</div>
                    </article>
                </div>
            </section>
        </main>

    </div>

</body>
</html>
